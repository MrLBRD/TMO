name: Build TMO Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libzbar0 libglib2.0-0

      - name: Install Python dependencies
        run: |
          pip install pytest
          pip install "numpy>=2.0,<3" "opencv-python-headless==4.13.0.92"
          pip install pyzbar==0.1.9 pillow==12.2.0 requests==2.33.1

      - name: Run tests
        run: pytest tests/ -v

  build:
    needs: test
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pip install "pyinstaller==6.10.0"
          pyinstaller TMO.spec

      - name: Smoke test EXE (imports critiques)
        run: dist\TMO.exe --smoke-test

      - name: Build installer with Inno Setup
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer.iss

      - name: Generate SHA256
        run: |
          $hash = Get-FileHash dist/TMO_Setup.exe -Algorithm SHA256
          "$($hash.Hash.ToLower())  TMO_Setup.exe" | Out-File -FilePath dist/TMO_Setup.exe.sha256 -Encoding ASCII -NoNewline

      - name: Upload installer artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: TMO_Setup
          path: |
            dist/TMO_Setup.exe
            dist/TMO_Setup.exe.sha256

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: TMO_Setup
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dist/TMO_Setup.exe
            dist/TMO_Setup.exe.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
